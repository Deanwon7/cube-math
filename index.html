<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>🧱 큐브 매스: 마스터 빌더 에디션 (모바일 터치 완벽 수정)</title>
<style>
  :root {
    --bg-main: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
    --panel-bg: rgba(44, 62, 80, 0.95);
    --panel-border: #1a252f;
    --text-light: #ecf0f1;
    --text-dark: #2c3e50;
    --accent-gold: #f1c40f;
    --accent-orange: #e67e22;
    --accent-red: #e74c3c;
    --accent-green: #2ecc71;
    --shadow-soft: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    --font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg-main);
    font-family: var(--font-family);
    color: var(--text-light);
    touch-action: none;
  }

  #app-container {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  #header-viewport {
    height: 60px;
    background: var(--panel-bg);
    border-bottom: 3px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    z-index: 10;
    flex-shrink: 0;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 900;
    color: var(--accent-gold);
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }

  .global-stats {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .stat-badge {
    background: rgba(0, 0, 0, 0.4);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .stat-badge span {
    color: var(--accent-gold);
    font-size: 16px;
    font-weight: 900;
  }

  .header-btn {
    background: var(--accent-red);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 0 #c0392b;
  }
  .header-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #c0392b;
  }

  #workspace-viewport {
    flex: 1;
    display: flex;
    position: relative;
    min-height: 0;
    width: 100%;
  }

  #renderer-container {
    flex: 1;
    height: 100%;
    position: relative;
    background: radial-gradient(circle at center, #34495e 0%, #2c3e50 100%);
    overflow: hidden;
  }

  #game-renderer {
    display: block;
    width: 100%;
    height: 100%;
  }

  #hotbar-viewport {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--panel-bg);
    border: 3px solid var(--panel-border);
    border-radius: 20px;
    padding: 15px;
    box-shadow: var(--shadow-soft);
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 15;
    backdrop-filter: blur(10px);
  }

  .hotbar-title {
    font-size: 11px;
    font-weight: 800;
    text-align: center;
    color: #a4b0be;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 6px;
  }

  .hotbar-slots {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .item-slot {
    width: 72px;
    height: 76px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #34495e;
    border: 3px solid #2c3e50;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .item-slot.active {
    background: #222f3e;
    border-color: var(--accent-gold);
    transform: scale(1.03);
  }

  .item-icon { font-size: 26px; margin-bottom: 2px; }
  .item-label { font-size: 10px; font-weight: 800; color: #c8d6e5; }
  .item-slot.active .item-label { color: var(--accent-gold); }

  .slot-badge {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--accent-gold);
    color: var(--text-dark);
    font-size: 10px;
    font-weight: 900;
    padding: 2px 6px;
    border-radius: 10px;
    border: 2px solid var(--panel-border);
  }

  .recharge-action-btn {
    background: var(--accent-orange);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 4px 0;
    font-size: 10px;
    font-weight: 900;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    box-shadow: 0 2px 0 #d35400;
  }

  #mission-dashboard {
    position: absolute;
    left: 20px;
    top: 20px;
    width: 320px;
    background: var(--panel-bg);
    border: 3px solid var(--panel-border);
    border-radius: 18px;
    padding: 16px;
    box-shadow: var(--shadow-soft);
    z-index: 15;
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .mission-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px dashed rgba(255,255,255,0.15);
    padding-bottom: 6px;
  }

  .mission-tag { background: #2980b9; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 6px; }
  .mission-skip { background: transparent; border: 1px solid #7f8c8d; color: #bdc3c7; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
  .mission-title { font-size: 14px; font-weight: 800; color: #fff; }

  .mission-formula-card {
    background: rgba(0,0,0,0.3); border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 700; color: var(--accent-gold); display: flex; align-items: center; gap: 6px;
  }

  .mission-tracker { background: #222f3e; border-radius: 10px; padding: 10px; font-size: 12px; border-left: 4px solid var(--accent-green); }
  .tracker-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .tracker-label { color: #8a97a5; font-weight: 700; }
  .tracker-value { font-weight: 800; color: #fff; }

  #system-toast {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); color: #fff; padding: 8px 20px; border-radius: 30px; font-size: 12px; font-weight: 700; pointer-events: none; z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); opacity: 0; transition: opacity 0.3s, transform 0.3s;
  }

  .modal-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-screen.hidden { display: none; }
  .dialog-card { background: #fff8e7; border: 5px solid var(--panel-border); border-radius: 24px; padding: 30px; width: 340px; text-align: center; color: var(--text-dark); }
  .quiz-category { font-size: 12px; font-weight: 900; color: var(--accent-orange); }
  .quiz-expression { font-size: 36px; font-weight: 900; margin: 15px 0; color: #1e272e; }
  .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .quiz-btn { background: #fff; border: 3px solid #dcdde1; border-radius: 14px; padding: 14px; font-size: 20px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 0 #dcdde1; }
  .quiz-btn.correct-feedback { background: var(--accent-green) !important; border-color: #27ae60 !important; color: white !important; box-shadow: 0 4px 0 #27ae60 !important; }
  #quiz-status-msg { margin-top: 15px; font-size: 13px; font-weight: 800; min-height: 20px; color: var(--accent-red); }

  .celebrate-icon { font-size: 50px; }
  .success-header { font-size: 24px; font-weight: 900; color: var(--accent-green); margin: 10px 0; }
  .success-summary { font-size: 13px; font-weight: 700; color: #57606f; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 10px; margin: 15px 0; line-height: 1.5; }
  .primary-action-btn { background: var(--accent-green); color: white; border: none; border-radius: 12px; padding: 12px 30px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #27ae60; width: 100%; }

  @media (max-width: 850px) {
    #workspace-viewport { flex-direction: column-reverse; }
    #hotbar-viewport { position: static; transform: none; width: 100%; flex-direction: row; border-radius: 0; border-width: 3px 0 0 0; padding: 10px; justify-content: center; }
    .hotbar-title { display: none; }
    .hotbar-slots { flex-direction: row; width: 100%; justify-content: space-around; max-width: 500px; }
    .item-slot { flex: 1; height: 64px; max-width: 80px; }
    .item-icon { font-size: 20px; }
    .item-label { font-size: 9px; }
    #mission-dashboard { width: calc(100% - 40px); max-width: 360px; left: 20px; top: 20px; padding: 10px; }
  }
</style>
</head>
<body>

<div id="app-container">
  <header id="header-viewport">
    <div class="brand-logo"><span>🧱</span> Jihoon's Mine Craft - 큐브맥스 1.2 <span style="font-size: 10px; background: rgba(255,255,255,0.15); padding: 2px 6px; border-radius: 4px; color: #fff;">PRO</span></div>
    <div class="global-stats">
      <div class="stat-badge">📊 누적 블록: <span id="ui-total-blocks">0</span>개</div>
      <button id="ctrl-reset-btn" class="header-btn">🔄 전체 초기화</button>
    </div>
  </header>

  <main id="workspace-viewport">
    <div id="renderer-container">
      <canvas id="game-renderer"></canvas>
    </div>

    <section id="mission-dashboard">
      <div class="mission-meta">
        <span class="mission-tag">MATH MISSION</span>
        <button id="ctrl-skip-btn" class="mission-skip">🔀 미션 건너뛰기</button>
      </div>
      <div id="ui-mission-title" class="mission-title">입체 연산 기하학 로딩 중...</div>
      <div id="ui-mission-formula" class="mission-formula-card">
        <span>📐</span> <div id="ui-formula-text">수학적 정의 분석 중...</div>
      </div>
      <div class="mission-tracker">
        <div class="tracker-row">
          <span class="tracker-label">현재 아키텍처 규격:</span>
          <span id="ui-track-size" class="tracker-value">0 × 0 × 0</span>
        </div>
        <div class="tracker-row">
          <span class="tracker-label">연산 결과 (현재 부피):</span>
          <span id="ui-track-volume" class="tracker-value">0</span>
        </div>
      </div>
    </section>

    <nav id="hotbar-viewport">
      <div class="hotbar-title">Tools</div>
      <div class="hotbar-slots">
        <div class="item-slot active" data-voxel="dirt">
          <div class="item-icon">🟫</div>
          <div class="item-label">흙 블록</div>
        </div>
        <div class="item-slot" data-voxel="stone">
          <div class="item-icon">⬜</div>
          <div class="item-label">석재 블록</div>
        </div>
        <div class="item-slot" data-voxel="gold">
          <div class="item-icon">🟨</div>
          <div class="item-label">황금 블록</div>
          <div id="ui-gold-badge" class="slot-badge">0</div>
          <button id="ctrl-quiz-btn" class="recharge-action-btn">🎰 충전</button>
        </div>
        <div class="item-slot" data-voxel="eraser">
          <div class="item-icon">⛏️</div>
          <div class="item-label">곡괭이</div>
        </div>
      </div>
    </nav>
  </main>

  <div id="system-toast">💡 두 손가락으로 화면을 벌려 확대하고, 드래그하여 움직이세요!</div>
</div>

<div id="modal-quiz" class="modal-screen hidden">
  <div class="dialog-card">
    <div class="quiz-category">🔒 황금 매트릭스 잠금해제 퀴즈</div>
    <div id="ui-quiz-q" class="quiz-expression">0 × 0 = ?</div>
    <div id="ui-quiz-choices" class="quiz-grid"></div>
    <div id="quiz-status-msg"></div>
  </div>
</div>

<div id="modal-success" class="modal-screen hidden">
  <div class="dialog-card">
    <div class="celebrate-icon">🏆</div>
    <h2 class="success-header">퍼펙트 아키텍트!</h2>
    <p id="ui-success-summary" class="success-summary">주어진 조건을 만족했습니다.</p>
    <button id="ctrl-next-btn" class="primary-action-btn">다음 미션으로 진급 ▶</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  const GRID_SIZE = 8;
  const MAX_HEIGHT = 8;
  
  const TILE_W = 70;         
  const TILE_H = 36;         
  const BLOCK_H = 38;        

  const VOXEL_PALETTE = {
    dirt:  { top: '#a0522d', right: '#8b4513', left: '#5c2e16', outline: '#3e1f0e' },
    stone: { top: '#bdc3c7', right: '#95a5a6', left: '#7f8c8d', outline: '#34495e' },
    gold:  { top: '#f1c40f', right: '#f39c12', left: '#d35400', outline: '#962d00' }
  };

  const canvas = document.getElementById('game-renderer');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('renderer-container');
  const uiTotalBlocks = document.getElementById('ui-total-blocks');
  const uiGoldBadge = document.getElementById('ui-gold-badge');
  const systemToast = document.getElementById('system-toast');

  let grid = [];
  for (let x = 0; x < GRID_SIZE; x++) {
    grid.push(new Array(GRID_SIZE).fill(null).map(() => []));
  }

  let zoom = 1.0;
  let panX = 0;
  let panY = 0;
  let selectedTool = 'dirt';
  let hoverTile = null;
  let goldStorage = 3;

  let isPointerDown = false;
  let startX = 0, startY = 0;       
  let prevPointerX = 0, prevPointerY = 0;
  let isPanningAction = false;       
  const PAN_DEADZONE = 8;            // 데드존 감도 약간 상향 조정 (8픽셀)

  let startPinchDist = 0;
  let startPinchZoom = 1.0;
  let blockPlacementLocked = false;  
  let isMutationCooling = false;     // 🛠️ 가스트 클릭 방지 실시간 타이머 락 변수
  let isTouchEventActive = false;    // 🛠️ 현재 모바일 터치 세션 구동 여부 플래그

  let particles = [];
  let animationFrameId = null;

  function syncViewportDimensions() {
    const dpr = window.devicePixelRatio || 1;
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    executeRenderPipeline();
  }
  window.addEventListener('resize', syncViewportDimensions);

  function calculateVoxelApex(gx, gy, hLevel) {
    const scaleW = TILE_W * zoom;
    const scaleH = TILE_H * zoom;
    const scaleBH = BLOCK_H * zoom;
    const centerX = (canvas.width / (window.devicePixelRatio || 1)) / 2 + panX;
    const centerY = (canvas.height / (window.devicePixelRatio || 1)) / 2 - (GRID_SIZE * scaleH / 2) + (hLevel * scaleBH * 0.2) + panY;
    return { x: centerX + (gx - gy) * (scaleW / 2), y: centerY + (gx + gy) * (scaleH / 2) - hLevel * scaleBH };
  }

  function buildTopPolygon(gx, gy, hLevel) {
    const apex = calculateVoxelApex(gx, gy, hLevel); const w2 = (TILE_W * zoom) / 2, h2 = (TILE_H * zoom) / 2;
    return [[apex.x, apex.y], [apex.x + w2, apex.y + h2], [apex.x, apex.y + (TILE_H * zoom)], [apex.x - w2, apex.y + h2]];
  }
  function buildLeftPolygon(gx, gy, hLevel) {
    const apex = calculateVoxelApex(gx, gy, hLevel); const w2 = (TILE_W * zoom) / 2, h2 = (TILE_H * zoom) / 2, bh = BLOCK_H * zoom;
    return [[apex.x - w2, apex.y + h2], [apex.x, apex.y + h2 * 2], [apex.x, apex.y + h2 * 2 + bh], [apex.x - w2, apex.y + h2 + bh]];
  }
  function buildRightPolygon(gx, gy, hLevel) {
    const apex = calculateVoxelApex(gx, gy, hLevel); const w2 = (TILE_W * zoom) / 2, h2 = (TILE_H * zoom) / 2, bh = BLOCK_H * zoom;
    return [[apex.x, apex.y + h2 * 2], [apex.x + w2, apex.y + h2], [apex.x + w2, apex.y + h2 + bh], [apex.x, apex.y + h2 * 2 + bh]];
  }

  function isPointInsidePoly(polygon, x, y) {
    let collide = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      const xi = polygon[i][0], yi = polygon[i][1];
      const xj = polygon[j][0], yj = polygon[j][1];
      if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi + 0.000001) + xi)) collide = !collide;
    }
    return collide;
  }

  function renderSolidPolygon(poly, fill, stroke) {
    ctx.beginPath(); ctx.moveTo(poly[0][0], poly[0][1]);
    for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
    ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = Math.max(0.8, 0.9 * zoom); ctx.stroke(); }
  }

  function executeRenderPipeline() {
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);

    for (let depthSum = 0; depthSum <= (GRID_SIZE - 1) * 2; depthSum++) {
      for (let gx = 0; gx < GRID_SIZE; gx++) {
        const gy = depthSum - gx; if (gy < 0 || gy >= GRID_SIZE) continue;

        const basePoly = buildTopPolygon(gx, gy, 0);
        const isSelectedTile = hoverTile && hoverTile.gx === gx && hoverTile.gy === gy;
        const baseColor = isSelectedTile && grid[gx][gy].length === 0 ? '#55efc4' : '#2ecc71';
        renderSolidPolygon(basePoly, baseColor, '#27ae60');

        const voxelStack = grid[gx][gy];
        for (let hz = 0; hz < voxelStack.length; hz++) {
          const type = voxelStack[hz]; const colorSet = VOXEL_PALETTE[type]; const actualZ = hz + 1;
          renderSolidPolygon(buildLeftPolygon(gx, gy, actualZ), colorSet.left, colorSet.outline);
          renderSolidPolygon(buildRightPolygon(gx, gy, actualZ), colorSet.right, colorSet.outline);
          if (hz === voxelStack.length - 1) renderSolidPolygon(buildTopPolygon(gx, gy, actualZ), colorSet.top, colorSet.outline);
        }

        if (isSelectedTile) {
          const currentHeight = voxelStack.length;
          if (selectedTool === 'eraser') {
            if (currentHeight > 0) {
              ctx.globalAlpha = 0.65; renderSolidPolygon(buildTopPolygon(gx, gy, currentHeight), '#d63031', '#ff7675'); ctx.globalAlpha = 1.0;
            }
          } else if (currentHeight < MAX_HEIGHT) {
            const previewPalette = VOXEL_PALETTE[selectedTool]; ctx.globalAlpha = 0.5;
            renderSolidPolygon(buildLeftPolygon(gx, gy, currentHeight + 1), previewPalette.left, previewPalette.outline);
            renderSolidPolygon(buildRightPolygon(gx, gy, currentHeight + 1), previewPalette.right, previewPalette.outline);
            renderSolidPolygon(buildTopPolygon(gx, gy, currentHeight + 1), previewPalette.top, previewPalette.outline);
            ctx.globalAlpha = 1.0;
          }
        }
      }
    }
    if (particles.length > 0) animateParticlesLoop();
  }

  function performRaycastCollision(screenX, screenY) {
    for (let depthSum = (GRID_SIZE - 1) * 2; depthSum >= 0; depthSum--) {
      for (let gx = GRID_SIZE - 1; gx >= 0; gx--) {
        const gy = depthSum - gx; if (gy < 0 || gy >= GRID_SIZE) continue;
        const stackHeight = grid[gx][gy].length;
        if (stackHeight > 0) {
          if (isPointInsidePoly(buildTopPolygon(gx, gy, stackHeight), screenX, screenY)) return { gx, gy };
          if (isPointInsidePoly(buildLeftPolygon(gx, gy, stackHeight), screenX, screenY)) return { gx, gy };
          if (isPointInsidePoly(buildRightPolygon(gx, gy, stackHeight), screenX, screenY)) return { gx, gy };
        } else if (isPointInsidePoly(buildTopPolygon(gx, gy, 0), screenX, screenY)) return { gx, gy };
      }
    }
    return null;
  }

  function resolvePointerCoordinates(evt) {
    const rect = canvas.getBoundingClientRect();
    return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
  }

  function onPointerDownStart(clientX, clientY) {
    isPointerDown = true;
    isPanningAction = false;
    blockPlacementLocked = false;
    startX = clientX;
    startY = clientY;
    prevPointerX = clientX;
    prevPointerY = clientY;
  }

  function onPointerMoveProcess(clientX, clientY) {
    if (!isPointerDown) return;
    const currentDeltaX = clientX - startX;
    const currentDeltaY = clientY - startY;

    if (!isPanningAction && (Math.abs(currentDeltaX) > PAN_DEADZONE || Math.abs(currentDeltaY) > PAN_DEADZONE)) {
      isPanningAction = true;
      blockPlacementLocked = true; 
    }

    if (isPanningAction) {
      panX += clientX - prevPointerX;
      panY += clientY - prevPointerY;
      const boundW = (canvas.width / (window.devicePixelRatio || 1)) * 0.7;
      const boundH = (canvas.height / (window.devicePixelRatio || 1)) * 0.7;
      panX = Math.min(Math.max(panX, -boundW), boundW);
      panY = Math.min(Math.max(panY, -boundH), boundH);
    }
    prevPointerX = clientX;
    prevPointerY = clientY;
  }

  // --- 🛠️ 핑거 모바일 전용 독립 리스너 매핑 (마우스 간섭 강제 배제) ---
  canvas.addEventListener('touchstart', function(e) {
    isTouchEventActive = true; // 터치 모드 진입 선언
    if (e.touches.length === 2) {
      isPointerDown = false;
      blockPlacementLocked = true;
      startPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      startPinchZoom = zoom;
    } else if (e.touches.length === 1) {
      onPointerDownStart(e.touches[0].clientX, e.touches[0].clientY);
      const pos = resolvePointerCoordinates(e.touches[0]);
      hoverTile = performRaycastCollision(pos.x, pos.y);
    }
    executeRenderPipeline();
  }, { passive: true });

  window.addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      zoom = Math.min(Math.max(startPinchZoom * (currentDist / startPinchDist), 0.45), 2.5);
      executeRenderPipeline();
    } else if (e.touches.length === 1 && isPointerDown) {
      onPointerMoveProcess(e.touches[0].clientX, e.touches[0].clientY);
      const pos = resolvePointerCoordinates(e.touches[0]);
      hoverTile = performRaycastCollision(pos.x, pos.y);
      executeRenderPipeline();
    }
  }, { passive: true });

  window.addEventListener('touchend', function(e) {
    if (isPointerDown && !blockPlacementLocked && e.changedTouches.length > 0) {
      const pos = resolvePointerCoordinates(e.changedTouches[0]);
      const target = performRaycastCollision(pos.x, pos.y);
      if (target) commitVoxelMutation(target.gx, target.gy);
    }
    isPointerDown = false;
    hoverTile = null;
    executeRenderPipeline();
    // 터치 직후 마우스 이벤트 유령 방출을 막기 위해 타임아웃 뒤 플래그 반환
    setTimeout(() => { isTouchEventActive = false; }, 350);
  }, { passive: true });

  // --- 데스크탑 전용 독립 마우스 백업 폴백 (터치 중일 땐 완벽하게 무시) ---
  canvas.addEventListener('mousedown', function(e) { 
    if (isTouchEventActive) return; 
    onPointerDownStart(e.clientX, e.clientY); 
  });
  
  window.addEventListener('mousemove', function(e) {
    if (isTouchEventActive) return;
    const pos = resolvePointerCoordinates(e);
    if(isPointerDown) {
      onPointerMoveProcess(e.clientX, e.clientY);
    }
    hoverTile = performRaycastCollision(pos.x, pos.y);
    executeRenderPipeline();
  });
  
  window.addEventListener('mouseup', function(e) {
    if (isTouchEventActive) return;
    if (isPointerDown && !blockPlacementLocked) {
      const pos = resolvePointerCoordinates(e);
      const target = performRaycastCollision(pos.x, pos.y);
      if (target) commitVoxelMutation(target.gx, target.gy);
    }
    isPointerDown = false;
    executeRenderPipeline();
  });

  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    zoom = Math.min(Math.max(zoom + e.deltaY * -0.0015, 0.45), 2.5);
    executeRenderPipeline();
  }, { passive: false });

  // --- 🧱 더블 트리거 보안 디바운스 기능이 강화된 적층 처리기 ---
  function commitVoxelMutation(gx, gy) {
    // 🛠️ 쿨다운 락이 풀리지 않았거나 배치가 이미 취소된 세션이면 탈출
    if (blockPlacementLocked || isMutationCooling) return;
    
    isMutationCooling = true; // 200ms 동안 세션 완전 차단
    setTimeout(() => { isMutationCooling = false; }, 200);

    blockPlacementLocked = true; 
    const targetStack = grid[gx][gy];

    if (selectedTool === 'eraser') {
      if (targetStack.length > 0) {
        targetStack.pop();
        triggerToastNotification("블록을 제거했습니다.");
        refreshSystemState();
      }
      return;
    }

    if (selectedTool === 'gold' && goldStorage <= 0) {
      triggerToastNotification("⚠️ 황금 블록 부족! 퀴즈로 충전하세요.");
      openRechargeQuizModal();
      return;
    }

    if (targetStack.length < MAX_HEIGHT) {
      targetStack.push(selectedTool);
      if (selectedTool === 'gold') { goldStorage--; syncInventoryDisplay(); }
      refreshSystemState();
    } else {
      triggerToastNotification("⚠️ 최대 높이 도달! (8층)");
    }
  }

  function refreshSystemState() {
    let aggregate = 0;
    for (let x = 0; x < GRID_SIZE; x++) {
      for (let y = 0; y < GRID_SIZE; y++) { aggregate += grid[x][y].length; }
    }
    uiTotalBlocks.textContent = aggregate;
    executeRenderPipeline();
    verifyMissionRequirement();
  }

  function triggerToastNotification(msg) {
    systemToast.textContent = msg; systemToast.style.opacity = '1';
    systemToast.style.transform = 'translateX(-50%) translateY(-5px)';
    clearTimeout(systemToast.timer);
    systemToast.timer = setTimeout(() => { systemToast.style.opacity = '0'; systemToast.style.transform = 'translateX(-50%) translateY(0)'; }, 2000);
  }

  const MISSION_POOL = [
    { type: 'fixed', width: 2, depth: 2, height: 2, name: '큐브 오두막 짓기' },
    { type: 'volume', targetVol: 12, name: '마법 상자의 비밀 (부피 12)' },
    { type: 'fixed', width: 3, depth: 2, height: 2, name: '직육면체 비밀기지' },
    { type: 'volume', targetVol: 24, name: '거대 보관창고 설계 (부피 24)' }
  ];
  let currentMissionIndex = 0;
  let isMissionCleared = false;

  function getCurrentMission() { return MISSION_POOL[currentMissionIndex % MISSION_POOL.length]; }

  function computeBoundingStructure() {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity; let hasData = false;
    for (let x = 0; x < GRID_SIZE; x++) {
      for (let y = 0; y < GRID_SIZE; y++) {
        if (grid[x][y].length > 0) {
          hasData = true;
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
      }
    }
    if (!hasData) return null;
    const w = maxX - minX + 1; const d = maxY - minY + 1;
    let maxH = 0, isPerfectFlat = true, referenceH = grid[minX][minY].length;

    for (let x = minX; x <= maxX; x++) {
      for (let y = minY; y <= maxY; y++) {
        const curH = grid[x][y].length;
        if (curH > maxH) maxH = curH;
        if (curH !== referenceH || curH === 0) isPerfectFlat = false;
      }
    }
    return { width: w, depth: d, maxHeight: maxH, isSolidRect: isPerfectFlat, calculatedVolume: w * d * referenceH };
  }

  function updateMissionUI() {
    const mission = getCurrentMission();
    document.getElementById('ui-mission-title').textContent = `🎯 ${mission.name}`;
    if (mission.type === 'fixed') {
      document.getElementById('ui-formula-text').innerHTML = `가로 <b>${mission.width}</b> × 세로 <b>${mission.depth}</b> × 높이 <b>${mission.height}</b> 구조`;
    } else {
      document.getElementById('ui-formula-text').innerHTML = `가로 × 세로 × 높이 = 부피가 딱 <b>${mission.targetVol}</b>인 입체`;
    }
    syncLiveMetrics();
  }

  function syncLiveMetrics() {
    const stats = computeBoundingStructure();
    const trackSize = document.getElementById('ui-track-size');
    const trackVol = document.getElementById('ui-track-volume');
    if (!stats) { trackSize.textContent = "0 × 0 × 0"; trackVol.textContent = "0 (건축 대기 중)"; trackVol.style.color = '#fff'; return; }
    if (stats.isSolidRect) {
      trackSize.textContent = `${stats.width} × ${stats.depth} × ${stats.maxHeight}`;
      trackVol.textContent = stats.calculatedVolume; trackVol.style.color = '#2ecc71';
    } else {
      trackSize.textContent = "규격 불일치"; trackVol.textContent = "울퉁불퉁함 (윗면 조절 필요)"; trackVol.style.color = '#e74c3c';
    }
  }

  function verifyMissionRequirement() {
    syncLiveMetrics();
    if (isMissionCleared) return;
    const stats = computeBoundingStructure(); if (!stats || !stats.isSolidRect) return;
    const mission = getCurrentMission(); let isPassed = false;

    if (mission.type === 'fixed') {
      const matchesStandard = (stats.width === mission.width && stats.depth === mission.depth);
      const matchesInverted = (stats.width === mission.depth && stats.depth === mission.width);
      if ((matchesStandard || matchesInverted) && stats.maxHeight === mission.height) isPassed = true;
    } else if (mission.type === 'volume') {
      if (stats.calculatedVolume === mission.targetVol) isPassed = true;
    }

    if (isPassed) { isMissionCleared = true; spawnConfettiExplosion(); document.getElementById('ui-success-summary').innerHTML = `축하합니다!<br><b>"${mission.name}"</b>을 완성했습니다.`; document.getElementById('modal-success').classList.remove('hidden'); }
  }

  function spawnConfettiExplosion() {
    const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#3498db', '#2ecc71'];
    const viewW = canvas.width / (window.devicePixelRatio || 1); const viewH = canvas.height / (window.devicePixelRatio || 1);
    for (let i = 0; i < 80; i++) {
      particles.push({ x: viewW / 2, y: viewH + 20, vx: (Math.random() - 0.5) * 14, vy: -Math.random() * 15 - 8, size: Math.random() * 5 + 4, color: colors[Math.floor(Math.random() * colors.length)], gravity: 0.35, rotation: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 8 });
    }
  }

  function animateParticlesLoop() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.rotation += p.rotSpeed;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180); ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size); ctx.restore();
      if (p.y > (canvas.height / (window.devicePixelRatio || 1)) + 50) particles.splice(i, 1);
    }
    if(particles.length > 0) animationFrameId = requestAnimationFrame(executeRenderPipeline);
  }

  let cachedQuizAnswer = null;
  function openRechargeQuizModal() {
    const operators = ['+', '-', '×']; const op = operators[Math.floor(Math.random() * operators.length)];
    let num1, num2, correctAns;
    if (op === '+') { num1 = Math.floor(Math.random() * 30) + 10; num2 = Math.floor(Math.random() * 30) + 10; correctAns = num1 + num2; }
    else if (op === '-') { num1 = Math.floor(Math.random() * 40) + 30; num2 = Math.floor(Math.random() * 25) + 5; correctAns = num1 - num2; }
    else { num1 = Math.floor(Math.random() * 7) + 2; num2 = Math.floor(Math.random() * 8) + 2; correctAns = num1 * num2; }

    cachedQuizAnswer = correctAns; document.getElementById('ui-quiz-q').textContent = `${num1} ${op} ${num2} = ?`;
    const optionSet = new Set([correctAns]);
    while (optionSet.size < 4) { const val = correctAns + (Math.floor(Math.random() * 15) - 7); if (val > 0 && val !== correctAns) optionSet.add(val); }

    const shuffledOptions = Array.from(optionSet).sort(() => Math.random() - 0.5);
    const choicesContainer = document.getElementById('ui-quiz-choices'); choicesContainer.innerHTML = '';

    shuffledOptions.forEach(val => {
      const optionBtn = document.createElement('button'); optionBtn.className = 'quiz-btn'; optionBtn.textContent = val;
      optionBtn.addEventListener('click', function() {
        if (val === cachedQuizAnswer) {
          optionBtn.classList.add('correct-feedback'); const reward = op === '×' ? 5 : 3; goldStorage += reward;
          triggerToastNotification(`정답! 황금 블록 ${reward}개 충전.`); syncInventoryDisplay();
          setTimeout(() => { document.getElementById('modal-quiz').classList.add('hidden'); setVoxelActiveTool('gold'); }, 600);
        } else { document.getElementById('quiz-status-msg').textContent = "❌ 다시 한 번 연산해 보세요!"; }
      });
      choicesContainer.appendChild(optionBtn);
    });
    document.getElementById('quiz-status-msg').textContent = ''; document.getElementById('modal-quiz').classList.remove('hidden');
  }

  function setVoxelActiveTool(toolName) {
    selectedTool = toolName;
    document.querySelectorAll('.item-slot').forEach(slot => slot.classList.toggle('active', slot.dataset.voxel === toolName));
    executeRenderPipeline();
  }
  function syncInventoryDisplay() { uiGoldBadge.textContent = goldStorage; }

  document.querySelectorAll('.item-slot').forEach(slot => {
    slot.addEventListener('click', function(e) { if (e.target.id === 'ctrl-quiz-btn') return; setVoxelActiveTool(slot.dataset.voxel); });
  });
  document.getElementById('ctrl-quiz-btn').addEventListener('click', function(e) { e.stopPropagation(); openRechargeQuizModal(); });
  document.getElementById('ctrl-skip-btn').addEventListener('click', function() { currentMissionIndex++; isMissionCleared = false; updateMissionUI(); });
  document.getElementById('ctrl-next-btn').addEventListener('click', function() { document.getElementById('modal-success').classList.add('hidden'); clearWorldGrid(); currentMissionIndex++; isMissionCleared = false; updateMissionUI(); });

  function clearWorldGrid() {
    for (let x = 0; x < GRID_SIZE; x++) for (let y = 0; y < GRID_SIZE; y++) grid[x][y] = [];
    particles = []; if(animationFrameId) cancelAnimationFrame(animationFrameId);
    refreshSystemState();
  }

  document.getElementById('ctrl-reset-btn').addEventListener('click', function() {
    if(confirm("맵을 초기화하시겠습니까?")) { clearWorldGrid(); zoom = 1.0; panX = 0; panY = 0; isMissionCleared = false; updateMissionUI(); }
  });

  setTimeout(() => { syncViewportDimensions(); syncInventoryDisplay(); updateMissionUI(); }, 100);
})();
</script>
</body>
