<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 큐브 매스: 인피니트 빌더</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Trebuchet MS', 'Malgun Gothic', sans-serif;
    background: linear-gradient(180deg, #7ec8f2 0%, #a8ddf0 40%, #cdeeff 100%);
    overflow: hidden;
  }
  #game {
    display: flex; flex-direction: column; align-items: center;
    height: 100%; padding: 10px; gap: 8px;
  }
  #topbar {
    width: 100%; max-width: 920px;
    display: flex; align-items: center; justify-content: space-between;
    background: #4a3728;
    border: 4px solid #2b1d14;
    border-radius: 10px;
    box-shadow: 0 4px 0 #1c120c, 0 6px 10px rgba(0,0,0,0.25);
    padding: 10px 16px;
    color: #fff8e7;
  }
  #topbar .title {
    font-size: 18px; font-weight: 800; text-shadow: 2px 2px 0 #000;
    letter-spacing: 1px;
  }
  #topbar .counter {
    font-size: 16px; font-weight: 700;
    background: #2b1d14; padding: 6px 14px; border-radius: 8px;
    border: 2px solid #6b4f3a;
  }
  #topbar .counter span {
    color: #ffd93d; font-size: 20px; text-shadow: 1px 1px 0 #000;
  }
  #resetBtn {
    background: #d9534f; color: #fff; border: 3px solid #7a2c29;
    border-radius: 8px; padding: 8px 14px; font-weight: 800; font-size: 13px;
    cursor: pointer; box-shadow: 0 3px 0 #7a2c29;
    transition: transform 0.05s;
  }
  #resetBtn:active { transform: translateY(3px); box-shadow: none; }

  #canvasWrap {
    background: linear-gradient(180deg, #bfe8ff 0%, #eafcff 100%);
    border: 5px solid #2b1d14;
    border-radius: 14px;
    box-shadow: 0 6px 0 #1c120c, 0 10px 18px rgba(0,0,0,0.3), inset 0 0 40px rgba(255,255,255,0.4);
    overflow: hidden;
  }
  #gameCanvas { display: block; cursor: pointer; touch-action: none; }

  #inventory {
    width: 100%; max-width: 920px;
    display: flex; justify-content: center; gap: 10px;
    background: #4a3728;
    border: 4px solid #2b1d14;
    border-radius: 10px;
    box-shadow: 0 4px 0 #1c120c, 0 6px 10px rgba(0,0,0,0.25);
    padding: 10px;
  }
  .tool {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: #6b4f3a; border: 3px solid #2b1d14; border-radius: 10px;
    color: #fff8e7; font-size: 26px; padding: 8px 16px; cursor: pointer;
    box-shadow: 0 3px 0 #2b1d14;
    transition: transform 0.05s, background 0.15s;
  }
  .tool span { font-size: 11px; font-weight: 700; }
  .tool:active { transform: translateY(3px); box-shadow: none; }
  .tool.active {
    background: #ffd93d; color: #2b1d14;
    box-shadow: 0 0 0 3px #fff, 0 3px 0 #b8860b;
  }

  #hint {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    color: #3a2a1c; font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.7); padding: 4px 10px; border-radius: 8px;
    pointer-events: none;
  }

  @media (max-width: 700px) {
    #topbar .title { font-size: 14px; }
    #topbar .counter { font-size: 13px; padding: 5px 10px; }
    .tool { padding: 6px 10px; font-size: 20px; }
  }
</style>
</head>
<body>

<div id="game">
  <div id="topbar">
    <div class="title">🧱 큐브 매스: 인피니트 빌더</div>
    <div class="counter">총 블록 개수: <span id="blockCount">0</span></div>
    <button id="resetBtn">🔄 전체 지우기</button>
  </div>

  <div id="canvasWrap">
    <canvas id="gameCanvas" width="900" height="560"></canvas>
  </div>

  <div id="inventory">
    <button class="tool active" data-tool="dirt" title="흙 블록">🟫<span>흙 블록</span></button>
    <button class="tool" data-tool="stone" title="석재 블록">⬜<span>석재 블록</span></button>
    <button class="tool" data-tool="gold" title="황금 블록">🟨<span>황금 블록</span></button>
    <button class="tool" data-tool="pickaxe" title="곡괭이 (삭제)">⛏️<span>곡괭이</span></button>
  </div>
</div>

<div id="hint">💡 격자를 클릭해서 블록을 쌓아보세요! (곡괭이를 선택하면 블록을 없앨 수 있어요)</div>

<script>
(function(){
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const blockCountEl = document.getElementById('blockCount');

  // ---------- 설정값 ----------
  const GRID_SIZE = 8;          // 8 x 8 바닥 격자
  const MAX_HEIGHT = 8;         // 한 칸에 최대 8층까지 쌓기 가능
  const TILE_W = 64;            // 타일 가로 폭
  const TILE_H = 32;            // 타일 세로 폭 (아이소메트릭 다이아몬드)
  const HALF_W = TILE_W / 2;
  const HALF_H = TILE_H / 2;
  const CUBE_HEIGHT = 34;       // 큐브 한 칸의 높이(옆면 길이)
  const ORIGIN_X = canvas.width / 2;
  const ORIGIN_Y = 90;

  // 블록 타입별 색상 (top, right면, left면)
  const BLOCK_COLORS = {
    dirt:  { top: '#9c6b3e', right: '#7a5230', left: '#5c3e24', outline: '#3f2a18' },
    stone: { top: '#b7b7b7', right: '#8f8f8f', left: '#6e6e6e', outline: '#4a4a4a' },
    gold:  { top: '#ffe066', right: '#f2b705', left: '#c98a00', outline: '#8a5a00' }
  };

  // grid[gx][gy] = ['dirt','stone', ...] (아래에서부터 쌓인 순서)
  let grid = [];
  for (let x = 0; x < GRID_SIZE; x++) {
    grid.push(new Array(GRID_SIZE).fill(null).map(() => []));
  }

  let currentTool = 'dirt'; // dirt | stone | gold | pickaxe
  let hoverCell = null;     // { gx, gy }

  // ---------- 좌표 변환 ----------
  function tileApex(gx, gy, z) {
    // z: 해당 칸의 "쌓인 층 수" (표면 높이). 반환값은 표면 다이아몬드의 꼭짓점(위쪽 점) 좌표.
    const sx = ORIGIN_X + (gx - gy) * HALF_W;
    const sy = ORIGIN_Y + (gx + gy) * HALF_H - z * CUBE_HEIGHT;
    return { x: sx, y: sy };
  }

  function topFacePoly(gx, gy, z) {
    const p = tileApex(gx, gy, z);
    return [
      [p.x, p.y],
      [p.x + HALF_W, p.y + HALF_H],
      [p.x, p.y + TILE_H],
      [p.x - HALF_W, p.y + HALF_H]
    ];
  }

  function leftFacePoly(gx, gy, z) {
    const p = tileApex(gx, gy, z);
    const bx = p.x, by = p.y + TILE_H;
    const lx = p.x - HALF_W, ly = p.y + HALF_H;
    return [
      [lx, ly], [bx, by],
      [bx, by + CUBE_HEIGHT], [lx, ly + CUBE_HEIGHT]
    ];
  }

  function rightFacePoly(gx, gy, z) {
    const p = tileApex(gx, gy, z);
    const bx = p.x, by = p.y + TILE_H;
    const rx = p.x + HALF_W, ry = p.y + HALF_H;
    return [
      [bx, by], [rx, ry],
      [rx, ry + CUBE_HEIGHT], [bx, by + CUBE_HEIGHT]
    ];
  }

  function pointInPoly(poly, px, py) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i][0], yi = poly[i][1];
      const xj = poly[j][0], yj = poly[j][1];
      const intersect = ((yi > py) !== (yj > py)) &&
        (px < (xj - xi) * (py - yi) / (yj - yi + 0.00001) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function drawPoly(poly, fillColor, strokeColor) {
    ctx.beginPath();
    ctx.moveTo(poly[0][0], poly[0][1]);
    for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
    ctx.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill();
    if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = 1.5; ctx.stroke(); }
  }

  // ---------- 렌더링 ----------
  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let sum = 0; sum <= (GRID_SIZE - 1) * 2; sum++) {
      for (let gx = 0; gx < GRID_SIZE; gx++) {
        const gy = sum - gx;
        if (gy < 0 || gy >= GRID_SIZE) continue;

        // 바닥 타일(잔디) 그리기
        const groundPoly = topFacePoly(gx, gy, 0);
        const isHoverGround = hoverCell && hoverCell.gx === gx && hoverCell.gy === gy && grid[gx][gy].length === 0;
        drawPoly(groundPoly, isHoverGround ? '#8fe08f' : '#7bc47f', '#5a9c5e');

        // 쌓인 블록들 그리기
        const stack = grid[gx][gy];
        for (let i = 0; i < stack.length; i++) {
          const type = stack[i];
          const colors = BLOCK_COLORS[type];
          const zTop = i + 1;
          drawPoly(leftFacePoly(gx, gy, zTop), colors.left, colors.outline);
          drawPoly(rightFacePoly(gx, gy, zTop), colors.right, colors.outline);
          if (i === stack.length - 1) {
            drawPoly(topFacePoly(gx, gy, zTop), colors.top, colors.outline);
          }
        }

        // 호버 미리보기 (반투명 블록)
        if (hoverCell && hoverCell.gx === gx && hoverCell.gy === gy) {
          const h = stack.length;
          if (currentTool === 'pickaxe') {
            if (h > 0) {
              ctx.globalAlpha = 0.55;
              drawPoly(topFacePoly(gx, gy, h), '#ff5555', '#aa0000');
              ctx.globalAlpha = 1;
            }
          } else if (h < MAX_HEIGHT) {
            const previewColors = BLOCK_COLORS[currentTool];
            ctx.globalAlpha = 0.5;
            drawPoly(leftFacePoly(gx, gy, h + 1), previewColors.left, previewColors.outline);
            drawPoly(rightFacePoly(gx, gy, h + 1), previewColors.right, previewColors.outline);
            drawPoly(topFacePoly(gx, gy, h + 1), previewColors.top, previewColors.outline);
            ctx.globalAlpha = 1;
          }
        }
      }
    }
  }

  // ---------- 총 블록 개수 계산 ----------
  function updateCount() {
    let total = 0;
    for (let x = 0; x < GRID_SIZE; x++)
      for (let y = 0; y < GRID_SIZE; y++)
        total += grid[x][y].length;
    blockCountEl.textContent = total;
  }

  // ---------- 클릭한 칸 찾기 (앞쪽 칸부터 우선 검사) ----------
  function findCellAt(px, py) {
    for (let sum = (GRID_SIZE - 1) * 2; sum >= 0; sum--) {
      for (let gx = GRID_SIZE - 1; gx >= 0; gx--) {
        const gy = sum - gx;
        if (gy < 0 || gy >= GRID_SIZE) continue;
        const stack = grid[gx][gy];
        const h = stack.length;

        if (h > 0) {
          if (pointInPoly(topFacePoly(gx, gy, h), px, py)) return { gx, gy };
          if (pointInPoly(leftFacePoly(gx, gy, h), px, py)) return { gx, gy };
          if (pointInPoly(rightFacePoly(gx, gy, h), px, py)) return { gx, gy };
        } else {
          if (pointInPoly(topFacePoly(gx, gy, 0), px, py)) return { gx, gy };
        }
      }
    }
    return null;
  }

  function getCanvasPos(evt) {
    const rect = canvas.getBoundingClientRect();
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  }

  function spawnPuffEffect(gx, gy, z) {
    // 간단한 파티클 없이도 살짝 느낌을 주는 플래시 효과
    const p = tileApex(gx, gy, z);
    let frame = 0;
    const particles = Array.from({ length: 8 }, (_, i) => ({
      x: p.x, y: p.y,
      vx: Math.cos((i / 8) * Math.PI * 2) * 2,
      vy: Math.sin((i / 8) * Math.PI * 2) * 2 - 1,
      life: 20
    }));
    function step() {
      render();
      particles.forEach(pt => {
        if (pt.life <= 0) return;
        pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life--;
        ctx.globalAlpha = Math.max(pt.life / 20, 0);
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      frame++;
      if (frame < 20) requestAnimationFrame(step);
    }
    step();
  }

  // ---------- 상호작용 ----------
  function handleClick(evt) {
    evt.preventDefault();
    const pos = getCanvasPos(evt);
    const cell = findCellAt(pos.x, pos.y);
    if (!cell) return;
    const { gx, gy } = cell;
    const stack = grid[gx][gy];

    if (currentTool === 'pickaxe') {
      if (stack.length > 0) {
        stack.pop();
        updateCount();
        render();
      }
    } else {
      if (stack.length < MAX_HEIGHT) {
        stack.push(currentTool);
        updateCount();
        spawnPuffEffect(gx, gy, stack.length);
      } else {
        flashHint('여기는 더 이상 높이 쌓을 수 없어요! 다른 칸에 쌓아볼까요?');
      }
    }
  }

  function handleMove(evt) {
    const pos = getCanvasPos(evt);
    const cell = findCellAt(pos.x, pos.y);
    hoverCell = cell;
    render();
  }

  const hintEl = document.getElementById('hint');
  let hintTimer = null;
  function flashHint(msg) {
    hintEl.textContent = '💡 ' + msg;
    hintEl.style.background = 'rgba(255, 220, 150, 0.95)';
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => {
      hintEl.textContent = '💡 격자를 클릭해서 블록을 쌓아보세요! (곡괭이를 선택하면 블록을 없앨 수 있어요)';
      hintEl.style.background = 'rgba(255,255,255,0.7)';
    }, 2200);
  }

  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('mousemove', handleMove);
  canvas.addEventListener('mouseleave', () => { hoverCell = null; render(); });
  canvas.addEventListener('touchstart', (e) => { handleMove(e); }, { passive: false });
  canvas.addEventListener('touchend', (e) => { handleClick(e); }, { passive: false });

  // ---------- 인벤토리 도구 선택 ----------
  document.querySelectorAll('.tool').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTool = btn.dataset.tool;
      render();
    });
  });

  // ---------- 전체 지우기 ----------
  document.getElementById('resetBtn').addEventListener('click', () => {
    for (let x = 0; x < GRID_SIZE; x++)
      for (let y = 0; y < GRID_SIZE; y++)
        grid[x][y] = [];
    updateCount();
    render();
  });

  // ---------- 초기 실행 ----------
  updateCount();
  render();
})();
</script>

</body>
</html>
