<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧱 큐브 매스: 인피니트 빌더 (안정화 버전)</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Trebuchet MS', 'Malgun Gothic', sans-serif;
    background: linear-gradient(180deg, #7ec8f2 0%, #a8ddf0 40%, #cdeeff 100%);
    overflow: hidden;
    touch-action: none;
  }
  #game {
    display: flex; flex-direction: column; align-items: center;
    height: 100%; padding: 10px; gap: 8px;
  }
  #topbar {
    width: 100%; max-width: 940px;
    display: flex; align-items: center; justify-content: space-between;
    background: #4a3728; border: 4px solid #2b1d14; border-radius: 10px;
    box-shadow: 0 4px 0 #1c120c, 0 6px 10px rgba(0,0,0,0.25);
    padding: 10px 16px; color: #fff8e7; z-index: 10;
  }
  #topbar .title { font-size: 18px; font-weight: 800; text-shadow: 2px 2px 0 #000; letter-spacing: 1px; }
  #topbar .counter {
    font-size: 15px; font-weight: 700; background: #2b1d14;
    padding: 6px 14px; border-radius: 8px; border: 2px solid #6b4f3a;
  }
  #topbar .counter span { color: #ffd93d; font-size: 19px; text-shadow: 1px 1px 0 #000; }
  #resetBtn {
    background: #d9534f; color: #fff; border: 3px solid #7a2c29; border-radius: 8px;
    padding: 8px 14px; font-weight: 800; font-size: 13px; cursor: pointer;
    box-shadow: 0 3px 0 #7a2c29; transition: transform 0.05s;
  }
  #resetBtn:active { transform: translateY(3px); box-shadow: none; }

  /* 터치 간섭 방지를 위해 영역을 독립적으로 격리 */
  #mainArea { 
    display: flex; gap: 14px; justify-content: center; align-items: flex-start;
    max-width: 940px; width: 100%; flex: 1; position: relative;
  }

  #canvasWrap {
    background: linear-gradient(180deg, #bfe8ff 0%, #eafcff 100%);
    border: 5px solid #2b1d14; border-radius: 14px;
    box-shadow: 0 6px 0 #1c120c, 0 10px 18px rgba(0,0,0,0.3), inset 0 0 40px rgba(255,255,255,0.4);
    overflow: hidden; flex-shrink: 0; position: relative; z-index: 1;
  }
  #gameCanvas { display: block; cursor: pointer; touch-action: none; }

  /* 제어 패널 독립 격리 */
  #sideControlPanel {
    width: 240px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; position: relative; z-index: 5;
  }

  #missionPanel {
    background: #4a3728; border: 4px solid #2b1d14; border-radius: 14px;
    box-shadow: 0 5px 0 #1c120c, 0 8px 15px rgba(0,0,0,0.3);
    color: #fff8e7; padding: 14px; display: flex; flex-direction: column; gap: 8px;
  }
  .missionHeader { font-size: 16px; font-weight: 800; text-shadow: 1px 1px 0 #000; border-bottom: 2px dashed #8a6a4d; padding-bottom: 6px; }
  .missionDesc { font-size: 13px; line-height: 1.5; background: #2b1d14; padding: 10px; border-radius: 8px; border: 2px solid #6b4f3a; color: #fff; }
  .missionTarget { font-size: 13px; font-weight: 700; color: #ffd93d; line-height: 1.4; }
  .missionProgress { font-size: 12px; background: #2b1d14; padding: 8px; border-radius: 8px; border: 2px solid #6b4f3a; line-height: 1.5; min-height: 54px; color: #a8ddf0; }
  #skipMissionBtn {
    background: #5b8dd6; color: #fff; border: 3px solid #2b4f7a; border-radius: 8px;
    padding: 7px 10px; font-weight: 800; font-size: 12px; cursor: pointer; box-shadow: 0 3px 0 #2b4f7a;
  }
  #skipMissionBtn:active { transform: translateY(3px); box-shadow: none; }

  #inventory {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    background: #4a3728; border: 4px solid #2b1d14; border-radius: 14px;
    box-shadow: 0 5px 0 #1c120c, 0 8px 15px rgba(0,0,0,0.3); padding: 12px;
  }
  .slot { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .tool-main {
    position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    background: #6b4f3a; border: 3px solid #2b1d14; border-radius: 10px;
    color: #fff8e7; font-size: 24px; padding: 10px 4px; cursor: pointer; width: 100%; min-height: 68px;
    box-shadow: 0 3px 0 #2b1d14; transition: transform 0.05s, background 0.15s;
  }
  .tool-main span { font-size: 11px; font-weight: 700; pointer-events: none; }
  .tool-main:active { transform: translateY(3px); box-shadow: none; }
  .tool-main.active { background: #ffd93d; color: #2b1d14; box-shadow: 0 0 0 3px #fff, 0 3px 0 #b8860b; }
  .badge {
    position: absolute; top: -6px; right: -6px; background: #ffd93d; color: #2b1d14;
    font-size: 11px; font-weight: 800; border-radius: 999px; padding: 2px 6px;
    border: 2px solid #2b1d14; min-width: 18px; text-align: center; pointer-events: none;
  }
  #goldRechargeBtn {
    background: #ffb347; color: #2b1d14; border: 2px solid #8a5a00; border-radius: 6px;
    padding: 4px 0; font-size: 10px; font-weight: 800; cursor: pointer; box-shadow: 0 2px 0 #8a5a00; width: 100%; text-align: center;
  }
  #goldRechargeBtn:active { transform: translateY(2px); box-shadow: none; }

  #hint {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    color: #3a2a1c; font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.85); padding: 6px 12px; border-radius: 8px; pointer-events: none;
    max-width: 90%; text-align: center; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.15);
  }

  /* 모달 레이어 */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex;
    align-items: center; justify-content: center; z-index: 50;
  }
  .overlay.hidden { display: none; }

  .quizBox {
    background: #fff8e7; border: 5px solid #2b1d14; border-radius: 16px; padding: 24px 28px;
    text-align: center; min-width: 310px; max-width: 90vw; box-shadow: 0 8px 0 #1c120c;
  }
  .quizTitle { font-size: 16px; font-weight: 800; color: #8a5a00; margin-bottom: 10px; }
  .quizQuestion { font-size: 34px; font-weight: 800; color: #2b1d14; margin: 10px 0 18px; }
  .quizChoices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quizChoiceBtn {
    background: #ffd93d; border: 3px solid #b8860b; border-radius: 10px;
    font-size: 22px; font-weight: 800; padding: 12px; cursor: pointer;
    box-shadow: 0 3px 0 #b8860b; color: #2b1d14;
  }
  .quizChoiceBtn:active { transform: translateY(3px); box-shadow: none; }
  .quizChoiceBtn.shake { animation: shake 0.4s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .quizFeedback { margin-top: 14px; font-size: 15px; font-weight: 700; min-height: 22px; }

  .successBox {
    background: #fff8e7; border: 5px solid #2b1d14; border-radius: 16px; padding: 28px 34px;
    text-align: center; box-shadow: 0 8px 0 #1c120c;
  }
  .successEmoji { font-size: 44px; margin-bottom: 6px; }
  .successTitle { font-size: 28px; font-weight: 800; color: #2e7d32; text-shadow: 1px 1px 0 #fff; }
  .successSub { font-size: 16px; color: #3a2a1c; margin: 8px 0 18px; font-weight: 700; }
  #nextMissionBtn {
    background: #2e7d32; color: #fff; border: 3px solid #1b5e20; border-radius: 8px;
    padding: 10px 24px; font-weight: 800; font-size: 15px; cursor: pointer; box-shadow: 0 3px 0 #1b5e20;
  }
  #nextMissionBtn:active { transform: translateY(3px); box-shadow: none; }

  #confettiLayer { position: fixed; inset: 0; pointer-events: none; z-index: 60; overflow: hidden; }
  .confetti { position: absolute; top: -20px; font-size: 22px; animation: fall linear forwards; }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(360deg); opacity: 0.9; }
  }

  /* 모바일/태블릿 반응형 레이아웃 꼬임 방지 */
  @media (max-width: 940px) {
    html, body { overflow: auto; }
    #game { height: auto; min-height: 100%; overflow-y: visible; }
    #mainArea { flex-direction: column; align-items: center; }
    #sideControlPanel { width: 100%; max-width: 680px; flex-direction: row; }
    #missionPanel { flex: 1; }
    #inventory { width: 240px; grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 550px) {
    #topbar .title { font-size: 14px; }
    #sideControlPanel { flex-direction: column; }
    #inventory { width: 100%; grid-template-columns: repeat(4, 1fr); }
    #canvasWrap { width: 100%; }
    #gameCanvas { width: 100%; height: auto; }
  }
</style>
</head>
<body>

<div id="game">
  <div id="topbar">
    <div class="title">🧱 jihoon 큐브 매스: 인피니트 빌더</div>
    <div class="counter">총 블록 개수: <span id="blockCount">0</span></div>
    <button id="resetBtn">🔄 전체 지우기</button>
  </div>

  <div id="mainArea">
    <div id="canvasWrap">
      <canvas id="gameCanvas" width="680" height="560"></canvas>
    </div>

    <div id="sideControlPanel">
      <div id="missionPanel">
        <div class="missionHeader">🎯 수학 미션</div>
        <div class="missionDesc" id="missionDesc">불러오는 중...</div>
        <div class="missionTarget" id="missionTarget"></div>
        <div class="missionProgress" id="missionProgress"></div>
        <button id="skipMissionBtn">🔀 다른 미션 보기</button>
      </div>

      <div id="inventory">
        <div class="slot">
          <button class="tool-main active" data-tool="dirt" title="흙 블록">🟫<span>흙 블록</span></button>
        </div>
        <div class="slot">
          <button class="tool-main" data-tool="stone" title="석재 블록">⬜<span>석재 블록</span></button>
        </div>
        <div class="slot">
          <button class="tool-main" data-tool="gold" title="황금 블록">🟨<span>황금 블록</span><span class="badge" id="goldBadge">0</span></button>
          <button id="goldRechargeBtn">🧮 퀴즈 충전</button>
        </div>
        <div class="slot">
          <button class="tool-main" data-tool="pickaxe" title="곡괭이 (삭제)">⛏️<span>곡괭이</span></button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="hint">💡 격자를 클릭해서 블록을 쌓아보세요!</div>

<div id="quizOverlay" class="overlay hidden">
  <div class="quizBox">
    <div class="quizTitle">🌟 황금 블록 획득 퀴즈!</div>
    <div class="quizQuestion" id="quizQuestion">6 × 7 = ?</div>
    <div class="quizChoices" id="quizChoices"></div>
    <div class="quizFeedback" id="quizFeedback"></div>
  </div>
</div>

<div id="successOverlay" class="overlay hidden">
  <div class="successBox">
    <div class="successEmoji">🎉🏆🎉</div>
    <div class="successTitle">미션 완료!</div>
    <div class="successSub" id="successSub">성공적인 건축가예요!</div>
    <button id="nextMissionBtn">다음 미션 ▶</button>
  </div>
</div>

<div id="confettiLayer"></div>

<script>
(function(){
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const blockCountEl = document.getElementById('blockCount');

  const GRID_SIZE = 8;
  const MAX_HEIGHT = 8;
  const TILE_W = 64, TILE_H = 32;
  const HALF_W = TILE_W / 2, HALF_H = TILE_H / 2;
  const CUBE_HEIGHT = 34;
  const ORIGIN_X = canvas.width / 2;
  const ORIGIN_Y = 70;

  const BLOCK_COLORS = {
    dirt:  { top: '#9c6b3e', right: '#7a5230', left: '#5c3e24', outline: '#3f2a18' },
    stone: { top: '#b7b7b7', right: '#8f8f8f', left: '#6e6e6e', outline: '#4a4a4a' },
    gold:  { top: '#ffe066', right: '#f2b705', left: '#c98a00', outline: '#8a5a00' }
  };

  let grid = [];
  for (let x = 0; x < GRID_SIZE; x++) grid.push(new Array(GRID_SIZE).fill(null).map(() => []));

  let currentTool = 'dirt';
  let hoverCell = null;
  let goldStock = 0;
  let currentOp = '+'; 

  function tileApex(gx, gy, z) {
    const sx = ORIGIN_X + (gx - gy) * HALF_W;
    const sy = ORIGIN_Y + (gx + gy) * HALF_H - z * CUBE_HEIGHT;
    return { x: sx, y: sy };
  }
  function topFacePoly(gx, gy, z) {
    const p = tileApex(gx, gy, z);
    return [[p.x, p.y], [p.x + HALF_W, p.y + HALF_H], [p.x, p.y + TILE_H], [p.x - HALF_W, p.y + HALF_H]];
  }
  function leftFacePoly(gx, gy, z) {
    const p = tileApex(gx, gy, z);
    const bx = p.x, by = p.y + TILE_H, lx = p.x - HALF_W, ly = p.y + HALF_H;
    return [[lx, ly], [bx, by], [bx, by + CUBE_HEIGHT], [lx, ly + CUBE_HEIGHT]];
  }
  function rightFacePoly(gx, gy, z) {
    const p = tileApex(gx, gy, z);
    const bx = p.x, by = p.y + TILE_H, rx = p.x + HALF_W, ry = p.y + HALF_H;
    return [[bx, by], [rx, ry], [rx, ry + CUBE_HEIGHT], [bx, by + CUBE_HEIGHT]];
  }
  function pointInPoly(poly, px, py) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
      const intersect = ((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi + 0.00001) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }
  function drawPoly(poly, fillColor, strokeColor) {
    ctx.beginPath();
    ctx.moveTo(poly[0][0], poly[0][1]);
    for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i][0], poly[i][1]);
    ctx.closePath();
    ctx.fillStyle = fillColor; ctx.fill();
    if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = 1.5; ctx.stroke(); }
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let sum = 0; sum <= (GRID_SIZE - 1) * 2; sum++) {
      for (let gx = 0; gx < GRID_SIZE; gx++) {
        const gy = sum - gx;
        if (gy < 0 || gy >= GRID_SIZE) continue;

        const groundPoly = topFacePoly(gx, gy, 0);
        const isHoverGround = hoverCell && hoverCell.gx === gx && hoverCell.gy === gy && grid[gx][gy].length === 0;
        drawPoly(groundPoly, isHoverGround ? '#8fe08f' : '#7bc47f', '#5a9c5e');

        const stack = grid[gx][gy];
        for (let i = 0; i < stack.length; i++) {
          const colors = BLOCK_COLORS[stack[i]];
          const zTop = i + 1;
          drawPoly(leftFacePoly(gx, gy, zTop), colors.left, colors.outline);
          drawPoly(rightFacePoly(gx, gy, zTop), colors.right, colors.outline);
          if (i === stack.length - 1) drawPoly(topFacePoly(gx, gy, zTop), colors.top, colors.outline);
        }

        if (hoverCell && hoverCell.gx === gx && hoverCell.gy === gy) {
          const h = stack.length;
          if (currentTool === 'pickaxe') {
            if (h > 0) { ctx.globalAlpha = 0.55; drawPoly(topFacePoly(gx, gy, h), '#ff5555', '#aa0000'); ctx.globalAlpha = 1; }
          } else if (h < MAX_HEIGHT) {
            const c = BLOCK_COLORS[currentTool];
            ctx.globalAlpha = 0.5;
            drawPoly(leftFacePoly(gx, gy, h + 1), c.left, c.outline);
            drawPoly(rightFacePoly(gx, gy, h + 1), c.right, c.outline);
            drawPoly(topFacePoly(gx, gy, h + 1), c.top, c.outline);
            ctx.globalAlpha = 1;
          }
        }
      }
    }
  }

  function updateCount() {
    let total = 0;
    for (let x = 0; x < GRID_SIZE; x++) for (let y = 0; y < GRID_SIZE; y++) total += grid[x][y].length;
    blockCountEl.textContent = total;
  }

  function findCellAt(px, py) {
    for (let sum = (GRID_SIZE - 1) * 2; sum >= 0; sum--) {
      for (let gx = GRID_SIZE - 1; gx >= 0; gx--) {
        const gy = sum - gx;
        if (gy < 0 || gy >= GRID_SIZE) continue;
        const stack = grid[gx][gy];
        const h = stack.length;
        if (h > 0) {
          if (pointInPoly(topFacePoly(gx, gy, h), px, py)) return { gx, gy };
          if (pointInPoly(leftFacePoly(gx, gy, h), px, py)) return { gx, gy };
          if (pointInPoly(rightFacePoly(gx, gy, h), px, py)) return { gx, gy };
        } else {
          if (pointInPoly(topFacePoly(gx, gy, 0), px, py)) return { gx, gy };
        }
      }
    }
    return null;
  }

  // 🚀getBoundingClientRect 오차 완벽 보정 로직
  function getCanvasPos(evt) {
    const rect = canvas.getBoundingClientRect();
    const e = (evt.touches && evt.touches.length > 0) ? evt.touches[0] : evt;
    
    // 스타일 상 크기와 실제 캔버스 내부 픽셀 비율 매핑 정밀화
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    return { 
      x: (e.clientX - rect.left) * scaleX, 
      y: (e.clientY - rect.top) * scaleY 
    };
  }

  function spawnPuffEffect(gx, gy, z) {
    const p = tileApex(gx, gy, z);
    let frame = 0;
    const particles = Array.from({ length: 8 }, (_, i) => ({
      x: p.x, y: p.y, vx: Math.cos((i / 8) * Math.PI * 2) * 2, vy: Math.sin((i / 8) * Math.PI * 2) * 2 - 1, life: 20
    }));
    function step() {
      render();
      particles.forEach(pt => {
        if (pt.life <= 0) return;
        pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life--;
        ctx.globalAlpha = Math.max(pt.life / 20, 0);
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(pt.x, pt.y, 3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      });
      frame++;
      if (frame < 20) requestAnimationFrame(step);
    }
    step();
  }

  const hintEl = document.getElementById('hint');
  let hintTimer = null;
  const DEFAULT_HINT = '💡 격자를 클릭해서 블록을 쌓아보세요!';
  function flashHint(msg) {
    hintEl.textContent = '💡 ' + msg;
    hintEl.style.background = 'rgba(255, 220, 150, 0.95)';
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => { hintEl.textContent = DEFAULT_HINT; hintEl.style.background = 'rgba(255,255,255,0.85)'; }, 2400);
  }

  function selectTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-main').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
    render();
  }
  function updateGoldBadge() { document.getElementById('goldBadge').textContent = goldStock; }

  document.querySelectorAll('.tool-main').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const tool = btn.dataset.tool;
      if (tool === 'gold' && goldStock <= 0) { openGoldQuiz(); return; }
      selectTool(tool);
    });
  });
  document.getElementById('goldRechargeBtn').addEventListener('click', (e) => { e.stopPropagation(); openGoldQuiz(); });

  function handleClick(evt) {
    if (evt.cancelable) evt.preventDefault();
    const pos = getCanvasPos(evt);
    const cell = findCellAt(pos.x, pos.y);
    if (!cell) return;
    const { gx, gy } = cell;
    const stack = grid[gx][gy];

    if (currentTool === 'pickaxe') {
      if (stack.length > 0) { stack.pop(); updateCount(); render(); evaluateMission(); }
      return;
    }

    if (currentTool === 'gold' && goldStock <= 0) { flashHint('황금 블록 재고가 없어요! 퀴즈를 풀어볼까요?'); openGoldQuiz(); return; }

    if (stack.length < MAX_HEIGHT) {
      stack.push(currentTool);
      if (currentTool === 'gold') { goldStock--; updateGoldBadge(); }
      updateCount();
      spawnPuffEffect(gx, gy, stack.length);
      evaluateMission();
    } else {
      flashHint('여기는 더 이상 높이 쌓을 수 없어요! 다른 칸에 쌓아볼까요?');
    }
  }

  function handleMove(evt) {
    const pos = getCanvasPos(evt);
    hoverCell = findCellAt(pos.x, pos.y);
    render();
    updateMissionProgressDisplay();
  }

  // 🚀 마우스 및 터치 리스너의 간섭 현상 원천 차단
  canvas.addEventListener('mousedown', (e) => { handleClick(e); });
  canvas.addEventListener('mousemove', (e) => { handleMove(e); });
  canvas.addEventListener('mouseleave', () => { hoverCell = null; render(); });
  
  canvas.addEventListener('touchstart', (e) => { 
    if (e.cancelable) e.preventDefault();
    handleMove(e); 
    handleClick(e);
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    if (e.cancelable) e.preventDefault();
    handleMove(e);
  }, { passive: false });

  document.getElementById('resetBtn').addEventListener('click', () => {
    for (let x = 0; x < GRID_SIZE; x++) for (let y = 0; y < GRID_SIZE; y++) grid[x][y] = [];
    updateCount(); render(); missionLocked = false; updateMissionPanel();
  });

  // ============================================================
  //  미션 시스템
  // ============================================================
  const MISSIONS = [
    { type: 'fixed', w: 2, d: 2, h: 2, label: '작은 오두막' },
    { type: 'volume', targetVol: 12, label: '마법의 상자 (부피 12)' }, 
    { type: 'fixed', w: 3, d: 2, h: 2, label: '비밀 기지' },
    { type: 'volume', targetVol: 18, label: '거인의 보관함 (부피 18)' }, 
    { type: 'fixed', w: 2, d: 2, h: 3, label: '높은 감시탑' },
    { type: 'fixed', w: 3, d: 3, h: 2, label: '넓은 창고' }
  ];
  let missionIndex = 0;
  let missionLocked = false;
  function currentMission() { return MISSIONS[missionIndex % MISSIONS.length]; }

  function getStructureStats() {
    let minX = null, maxX = null, minY = null, maxY = null;
    for (let x = 0; x < GRID_SIZE; x++) {
      for (let y = 0; y < GRID_SIZE; y++) {
        if (grid[x][y].length > 0) {
          if (minX === null || x < minX) minX = x;
          if (maxX === null || x > maxX) maxX = x;
          if (minY === null || y < minY) minY = y;
          if (maxY === null || y > maxY) maxY = y;
        }
      }
    }
    if (minX === null) return null;
    const width = maxX - minX + 1, depth = maxY - minY + 1;
    let maxH = 0, uniform = true, firstH = null;
    for (let x = minX; x <= maxX; x++) {
      for (let y = minY; y <= maxY; y++) {
        const h = grid[x][y].length;
        if (h > maxH) maxH = h;
        if (firstH === null) firstH = h; else if (h !== firstH) uniform = false;
      }
    }
    return { minX, maxX, minY, maxY, width, depth, maxHeight: maxH, uniformHeight: uniform ? firstH : null };
  }

  function checkMissionComplete(mission) {
    const stats = getStructureStats();
    if (!stats) return false;

    for (let x = stats.minX; x <= stats.maxX; x++) {
      for (let y = stats.minY; y <= stats.maxY; y++) {
        if (grid[x][y].length !== stats.maxHeight) return false;
      }
    }

    if (mission.type === 'fixed') {
      const matchNormal = stats.width === mission.w && stats.depth === mission.d;
      const matchRotated = stats.width === mission.d && stats.depth === mission.w;
      return (matchNormal || matchRotated) && stats.maxHeight === mission.h;
    } else if (mission.type === 'volume') {
      const currentVol = stats.width * stats.depth * stats.maxHeight;
      return currentVol === mission.targetVol;
    }
    return false;
  }

  function evaluateMission() {
    updateMissionProgressDisplay();
    if (missionLocked) return;
    if (checkMissionComplete(currentMission())) { missionLocked = true; showMissionSuccess(); }
  }

  function updateMissionPanel() {
    const m = currentMission();
    if (m.type === 'fixed') {
      document.getElementById('missionDesc').textContent = `"${m.label}" — 가로 ${m.w}칸 × 세로 ${m.d}칸 × 높이 ${m.h}칸 모양을 만드세요!`;
      document.getElementById('missionTarget').innerHTML = `📐 부피 공식: ${m.w} × ${m.d} × ${m.h}<br>🎯 필요한 총 블록: <span style="color:#ffd93d; font-size:15px;">${m.w * m.d * m.h}개</span>`;
    } else {
      document.getElementById('missionDesc').textContent = `"${m.label}" — 부피(가로×세로×높이)가 딱 ${m.targetVol}이 되는 직육면체를 자유롭게 만드세요!`;
      document.getElementById('missionTarget').innerHTML = `🎯 목표 부피: <span style="color:#ffb347; font-size:16px;">${m.targetVol}</span> (다양한 조합을 찾아봐요!)`;
    }
    updateMissionProgressDisplay();
  }

  function updateMissionProgressDisplay() {
    const stats = getStructureStats();
    const el = document.getElementById('missionProgress');
    if (!stats) { el.textContent = '아직 만든 구조물이 없어요.'; return; }
    
    const h = stats.uniformHeight === null ? `${stats.maxHeight} (울퉁불퉁)` : stats.uniformHeight;
    const isPerfectBox = stats.uniformHeight !== null;
    
    if (isPerfectBox) {
      const currentVol = stats.width * stats.depth * stats.uniformHeight;
      el.innerHTML = `현재 구조: 가로 ${stats.width} × 세로 ${stats.depth} × 높이 ${h}<br>▶ <span style="color:#fff;">현재 계산된 부피: ${currentVol}</span>`;
    } else {
      el.innerHTML = `현재 구조: 가로 ${stats.width} × 세로 ${stats.depth} × 높이 ${h}<br><span style="color:#ff5555;">(윗면을 평평하게 맞춰야 부피가 계산돼요!)</span>`;
    }
  }

  function showMissionSuccess() {
    const m = currentMission();
    document.getElementById('successSub').textContent = `"${m.label}" 미션 성공! 수학 공간 능력이 최고예요!`;
    document.getElementById('successOverlay').classList.remove('hidden');
    launchConfetti();
  }

  document.getElementById('nextMissionBtn').addEventListener('click', () => {
    document.getElementById('successOverlay').classList.add('hidden');
    missionIndex++; missionLocked = false; updateMissionPanel();
  });
  document.getElementById('skipMissionBtn').addEventListener('click', () => {
    missionIndex++; missionLocked = false; updateMissionPanel();
  });

  function launchConfetti() {
    const layer = document.getElementById('confettiLayer');
    const emojis = ['🎉', '✨', '⭐', '🎊', '🏆'];
    for (let i = 0; i < 30; i++) {
      const span = document.createElement('span');
      span.className = 'confetti';
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.animationDuration = (2 + Math.random() * 1.5) + 's';
      span.style.fontSize = (16 + Math.random() * 14) + 'px';
      layer.appendChild(span);
      setTimeout(() => span.remove(), 4000);
    }
  }

  // ============================================================
  //  황금 블록 연산 퀴즈
  // ============================================================
  let currentQuizAnswer = null;
  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

  function openGoldQuiz() {
    const ops = ['+', '-', '×'];
    const op = ops[rand(0, 2)];
    currentOp = op; 
    let a, b, answer;
    if (op === '+') { a = rand(2, 15); b = rand(2, 15); answer = a + b; }
    else if (op === '-') { a = rand(6, 20); b = rand(1, a - 1); answer = a - b; }
    else { a = rand(2, 9); b = rand(2, 9); answer = a * b; }

    currentQuizAnswer = answer;
    document.getElementById('quizQuestion').textContent = `${a} ${op} ${b} = ?`;
    const choices = generateChoices(answer);
    const choicesEl = document.getElementById('quizChoices');
    choicesEl.innerHTML = '';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'quizChoiceBtn';
      btn.textContent = c;
      btn.addEventListener('click', () => handleQuizAnswer(c, btn));
      choicesEl.appendChild(btn);
    });
    document.getElementById('quizFeedback').textContent = '';
    document.getElementById('quizOverlay').classList.remove('hidden');
  }

  function generateChoices(answer) {
    const set = new Set([answer]);
    let guard = 0;
    while (set.size < 4 && guard < 50) {
      guard++;
      const delta = rand(-6, 6);
      const val = answer + delta;
      if (val > 0 && !set.has(val)) set.add(val);
    }
    return shuffle(Array.from(set));
  }

  function handleQuizAnswer(val, btn) {
    const fb = document.getElementById('quizFeedback');
    if (val === currentQuizAnswer) {
      const finalReward = (currentOp === '×') ? 5 : 3;
      fb.textContent = `🎉 정답이에요! 황금 블록 ${finalReward}개 획득!`;
      fb.style.color = '#2e7d32';
      goldStock += finalReward;
      updateGoldBadge();
      setTimeout(() => { 
        document.getElementById('quizOverlay').classList.add('hidden'); 
        selectTool('gold'); 
      }, 1100);
    } else {
      fb.textContent = '다시 한번 생각해봐요! 손가락으로 세어볼까요? 🤔';
      fb.style.color = '#c0392b';
      btn.classList.add('shake');
      setTimeout(() => btn.classList.remove('shake'), 400);
    }
  }

  updateCount();
  updateGoldBadge();
  updateMissionPanel();
  render();
})();
</script>

</body>
</html>
